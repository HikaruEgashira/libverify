[workspace]
members = ["crates/core", "crates/policy", "crates/output", "crates/verif"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
libverify-core = { path = "crates/core" }
libverify-policy = { path = "crates/policy" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
regorus = "0.9"
creusot-std = { git = "https://github.com/creusot-rs/creusot", package = "creusot-std" }

[profile.release]
lto = true
strip = true
codegen-units = 1
