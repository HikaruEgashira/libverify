name: Publish to crates.io
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          toolchain: stable
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
        timeout-minutes: 5
      - name: Publish libverify-core
        timeout-minutes: 5
        run: cargo publish -p libverify-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index
        timeout-minutes: 2
        run: sleep 30
      - name: Publish libverify-policy
        timeout-minutes: 5
        run: cargo publish -p libverify-policy
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish libverify-vanta
        timeout-minutes: 5
        run: cargo publish -p libverify-vanta
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish libverify-output
        timeout-minutes: 5
        run: cargo publish -p libverify-output
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index
        timeout-minutes: 2
        run: sleep 30
      - name: Publish libverify-github
        timeout-minutes: 5
        run: cargo publish -p libverify-github
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish libverify-gitlab
        timeout-minutes: 5
        run: cargo publish -p libverify-gitlab
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        timeout-minutes: 5
        with:
          subject-path: Cargo.toml
