name: check-pr
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
concurrency:
  group: check-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read
jobs:
  verify:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: HikaruEgashira/gh-verify@96203c3dc4be07e27aaf340566ebae2198084310 # v0.19.0
        timeout-minutes: 5
        with:
          command: pr
          argument: ${{ github.event.pull_request.number }}
          format: json
          policy: oss
