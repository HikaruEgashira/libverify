name: verify-repo
on:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1" # Mon 03:23 UTC
  workflow_dispatch:
permissions:
  contents: read
  security-events: read
jobs:
  verify:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: HikaruEgashira/gh-verify@96203c3dc4be07e27aaf340566ebae2198084310 # v0.19.0
        id: verify
        timeout-minutes: 5
        with:
          command: repo
          format: json
          policy: oss
          audit: "true"
