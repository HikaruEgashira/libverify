name: verify-repo

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1" # Mon 03:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: HikaruEgashira/gh-verify@v0.14
        id: verify
        with:
          command: repo
          format: json
          policy: oss
          audit: "true"
